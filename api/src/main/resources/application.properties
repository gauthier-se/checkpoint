spring.application.name=api

spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IGDB API Configuration (via Twitch OAuth2)
igdb.api.client-id=${IGDB_CLIENT_ID:}
igdb.api.client-secret=${IGDB_CLIENT_SECRET:}
igdb.api.base-url=https://api.igdb.com/v4
igdb.api.auth-url=https://id.twitch.tv/oauth2/token

# Steam Web API + OpenID 2.0
steam.api.key=${STEAM_API_KEY:}
steam.api.base-url=https://api.steampowered.com
steam.openid.provider-url=https://steamcommunity.com/openid/login
# Realm and return URL used in the OpenID 2.0 redirect. Steam will redirect the
# user back to the return URL, which must be on the **web origin** (proxied to
# this API by Nitro) so the user's auth cookie reaches us for the link flow.
steam.openid.realm=${STEAM_OPENID_REALM:http://localhost:3000}
steam.openid.return-url=${STEAM_OPENID_RETURN_URL:http://localhost:3000/api/auth/steam/openid/callback}

# JWT Configuration
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudCBvbmx5IGRvIG5vdCB1c2UgaW4gcHJvZHVjdGlvbg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Mail Configuration (MailHog for local development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Hibernate Search (Lucene)
spring.jpa.properties.hibernate.search.backend.type=lucene
spring.jpa.properties.hibernate.search.backend.directory.type=local-filesystem
spring.jpa.properties.hibernate.search.backend.directory.root=data/search-index

# Frontend URL — used by the OAuth2 success/failure handlers to redirect the browser back
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Cookie security — set to false in local dev (HTTP), true in production (HTTPS)
app.cookie.secure=${COOKIE_SECURE:true}

# OAuth2 client credentials.
# OAuth2 login is wired programmatically (see OAuth2ClientRegistrationConfig)
# only when both id and secret are non-empty for at least one provider.
oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth2.twitch.client-id=${TWITCH_CLIENT_ID:}
oauth2.twitch.client-secret=${TWITCH_CLIENT_SECRET:}

# News auto-import — RSS feeds (see NewsImportTask)
news.rss.feeds[0].name=IGN
news.rss.feeds[0].url=https://feeds.feedburner.com/ign/all
news.rss.feeds[1].name=Eurogamer
news.rss.feeds[1].url=https://www.eurogamer.net/?format=rss
news.rss.feeds[2].name=Rock Paper Shotgun
news.rss.feeds[2].url=https://www.rockpapershotgun.com/feed
