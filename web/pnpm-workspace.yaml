packages:
  - '.'

allowBuilds:
  esbuild: true
  unrs-resolver: true

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver

# Force-bump transitive deps with known security advisories. Each entry has a
# brief justification; revisit when our direct deps catch up so we can drop
# the override.
overrides:
  # @tanstack/react-devtools → solid-js → seroval (RCE, DoS, prototype pollution)
  seroval: ^1.5.4
  seroval-plugins: ^1.5.4
  # ESLint plugins pull old minimatch versions (ReDoS).
  minimatch@<3.1.3: ^3.1.3
  minimatch@>=9.0.0 <9.0.6: ^9.0.6
  # vite/postcss/eslint chains pull old picomatch (ReDoS, method injection).
  picomatch: ^4.0.4
  # eslint/optionator → brace-expansion (ReDoS / resource exhaustion).
  brace-expansion: ^2.0.3
  '@isaacs/brace-expansion': ^5.0.1
  # flatted via eslint cache utils (DoS, prototype pollution).
  flatted: ^3.3.4
  # ws via dev tools (uninitialized memory disclosure).
  ws: ^8.21.0
  # vite/@vitejs pulls older rollup transitively (path traversal).
  rollup: ^4.60.4
  # postcss via tailwind/vite chain (XSS in CSS parsing).
  postcss: ^8.5.10
  # vite/eslint chain pulls old ajv (ReDoS in $data option).
  ajv: ^6.14.0
  # diff via vitest snapshot diffing (DoS).
  diff: ^8.0.3
  # vitest 3.x pins old vite (server.fs.deny bypass, arbitrary file read,
  # path traversal). Force the patched 7.3.3 across the tree.
  vite: ^7.3.3
