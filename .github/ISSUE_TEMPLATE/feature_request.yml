name: ✨ Feature request
description: Suggest an idea or enhancement for CheckPoint
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.
  - type: dropdown
    id: module
    attributes:
      label: Target module
      description: Which part of CheckPoint would this affect?
      options:
        - api (Spring Boot)
        - web (TanStack Start)
        - desktop (JavaFX)
        - cross-cutting / not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or any other context.
    validations:
      required: false
