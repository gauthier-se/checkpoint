name: 🐛 Bug report
description: Report a problem to help us improve CheckPoint
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as you can.
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      description: Which part of CheckPoint is affected?
      options:
        - api (Spring Boot)
        - web (TanStack Start)
        - desktop (JavaFX)
        - other / not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Java/Node version, etc.
      placeholder: "macOS 15, Chrome 124, Java 21, Node 20"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots.
      render: shell
    validations:
      required: false
